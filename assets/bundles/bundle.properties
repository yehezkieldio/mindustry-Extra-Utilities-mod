block.extra-utilities-full-efficiency.name = Omni Source
block.extra-utilities-full-efficiency.description = Solves most consumption needs. Can output all items at once and independently select item and liquid outputs.
block.extra-utilities-minichisa.name = Chisa Movable Sign
block.extra-utilities-minichisa.description = WUTHERING WAVES // FANON\nCute Chisa ~ Come and poke me ~
stat-extra-utilities-minichisa.abi-0.name = [#a639b9]Discerning Eye[]
stat-extra-utilities-minichisa.abi-0.description = When taking damage, immediately deals 61803 true damage to all enemies within range.\nThis fixed damage can never reduce a target below 61.803% of maximum health.\nThen deals an additional 772 damage and applies Ullification.\n[accent]Ullification[]:\nEnemies marked by Chisa have reduced health multiplier and lose 10 armor for the duration.\n12-second cooldown.
stat-extra-utilities-minichisa.abi-1.name = [#a639b9]Inextricable Fate[]
stat-extra-utilities-minichisa.abi-1.description = When the Discerning Eye kills a unit, its cooldown is immediately reset. \nCan trigger up to once every 3 seconds.
stat-extra-utilities-minichisa.abi-2.name = [#a639b9]Per Atria Vasta[]
stat-extra-utilities-minichisa.abi-2.description = Discerning Eye only activates when enemies are within range.\nWhen Discerning Eye applies Ullification, grants:\n- +30% damage for 15 seconds
status.extra-utilities-ullification.name = Ullification
status.extra-utilities-ullification.description = Enemies marked by Chisa instantly receive 61803 true damage, but this cannot reduce their health below 61.803% of maximum health. Also reduces health multiplier and armor by 10 for the duration.

