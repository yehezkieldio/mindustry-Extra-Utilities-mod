stat-sp-extra-utilities-lightnin-alloy.ammo = Greatly reduced fire rate.\nFires a high-activity armor-piercing bullet that can curve toward targets within range.\nAfter hitting a target, the bullet ricochets up to 4 times, preferring units and avoiding duplicate targets.\n[#e55454][!]Each ricochet reduces damage by 30%.[]\nIf the bullet hits a unit, additional effects may trigger:\n- Fully Broken\n┗━ The next ricochet does not lose damage and deals true damage equal to 50% of bullet damage.\n- Ullification\n┗━ Deals additional true damage equal to 2% of the unit's maximum health.

