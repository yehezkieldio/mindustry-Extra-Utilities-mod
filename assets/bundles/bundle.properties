mod.extra-utilities.description = [yellow]Private-use maintenance fork of Extra Utilities.[]\nSource build only; no public release channel is provided here.\n\nTargets Mindustry V8 build 157.1+.\nIncludes compatibility fixes, safer progression wiring, and selected performance cleanup.\nRemoves unused EUI, rogue-like, Tower Defense, and legacy campaign remnants.
mod.extra-utilities.mapMaker = [yellow]Credits to:\n[blue]Mapper [white]: guiYMOUR, Carrot, 血压增高器, [blue]冷冻液_[cyan]Cry0flu1d[white], 黑白老鼠, [VALVE], 我是紫罗啊\n[red]scripting support [white]: guiYMOUR, EB Wilson, miner
mod.extra-utilities.update = This build refreshes Mindustry V8 compatibility, removes stale legacy paths, and tightens several crash-prone runtime paths.

tips.name = Notes
tips.description = Extra Utilities is being maintained for current Mindustry V8 builds.\n[red]If this panel is clipped[], drag the lower area to scroll.

