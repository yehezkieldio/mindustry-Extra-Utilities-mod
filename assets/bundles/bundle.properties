extra-utilities.update-log = Update Log {0}
extra-utilities.update-log-0 = <- Click the icon to view
extra-utilities.update-log-1 = - Fixed the bug where clicking "Switch" after copying would cause synchronization\n The next Omni Source will not record the previous content, and a selection item display has been added for the Omni Source
extra-utilities.update-log-2 = - Bullets now deal area damage and can pierce one target, but the duration of LastStand has been reduced
extra-utilities.update-log-3 = - A new talent has been added to it, which can now clear all missiles within the explosion range, but reduces the firing rate
extra-utilities.update-log-4 = - Rate of fire increased, add new ammo with Lightning Alloy bullets. You can click on the icon to view the specific effects
extra-utilities.update-log-5 = - Add new ammo with Lightning Alloy bullets. You can click on the icon to view the specific effects
extra-utilities.update-log-6 = - Enhanced in Hard Mode, increasing damage and firing rate
extra-utilities.update-log-7 = - Attraction units and buildings will be planned according to whether they belong to the ground or air. "Ground" will be blocked by buildings while "Air" will not\n Making the gravitational effect more realistic
extra-utilities.update-log-8 = - Reduced item capacity but increased speed. Now, the speed of item transfer is faster, but the carrying capacity has been reduced. Modifications include the Inverted Titanium Junction
extra-utilities.update-log-9 = - Developer Information:\nVarious fixes and optimizations, bug fixes, display fixes, text fixes\n[accent]Update Preview[]:\n- Robotic Arm: A brand new unloading method\n- Sandbag: A building used for testing DPS, which can summon the unit "Test Dummy", available in survival mode
