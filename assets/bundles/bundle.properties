stat-extra-utilities-penitent.abi-1.description = "Last Stand" can trigger without power.\nWhen receiving non-true fatal damage, retains 1% HP and gains 2s of "Last Stand".\nDestroys itself when the effect ends.
stat-extra-utilities-penitent.abi-2.name = [accent]"My Realm"[]
stat-extra-utilities-penitent.abi-2.description = Cannot be controlled.\nEnters standby after no enemies are nearby for a while.\nIf not in "Last Stand", regenerates 2% HP per second.\nEach debuff on the target increases bullet damage by 10%, up to 30% (multiplicative, armor-piercing).

stat-extra-utilities-antiaircraft.abi-0.name = [accent]Weak-Spot Breakthrough[]
stat-extra-utilities-antiaircraft.abi-0.description = After detonation, first deals standard armor-piercing damage equal to bullet splash damage to all nearby air units.\nThen deals an extra 20% of splash damage as true damage to air units within 50% of the blast radius.
stat-extra-utilities-sancta.abi-0.name = [accent]Shell Strip[]
stat-extra-utilities-sancta.abi-0.description = Each point of armor on the target increases particle damage by 10%.
stat-extra-utilities-sancta.abi-1.name = [accent]Finale[]
stat-extra-utilities-sancta.abi-1.description = Particles instantly kill units with 80+ armor.\n If the target has “Fully Broken”, deal an additional 50% of the hit as true damage.
stat-extra-utilities-arbiter.abi-0.name = [#FFD37F]Nova[]
stat-extra-utilities-arbiter.abi-0.description = Pulls in weaker units and buildings (HP lower than the next hit, size <= 3).\nPeriodically reduces incoming bullet damage and attracts bullets weaker than itself.\nAttracted entities orbit the unit, deal damage, and periodically release stardust.\nWhen the pull ends, releases all entities, inflicting stun and other debuffs.
stat-extra-utilities-arbiter.abi-1.name = [accent]Wind Erosion[]
stat-extra-utilities-arbiter.abi-1.description = Larger units take more damage; extremely strong units are quickly destroyed.\n If the target has “Fully Broken”, deal an additional 50% of the hit as true damage.
stat-extra-utilities-shooting-star.abi-0.name = [#f7d7fc]Victory Pose[]
stat-extra-utilities-shooting-star.abi-0.description = Attacks apply Starlight debuff.\n Hitting a Starlight-debuffed enemy summons a meteor toward their position.\n The meteor damages and applies Starlight to all enemies in its path.\n Each bullet triggers independently.
stat-extra-utilities-shooting-star.abi-1.name = [#f7d7fc]Reisa’s Presence[]
stat-extra-utilities-shooting-star.abi-1.description = For every enemy with Starlight within attack range,\ngains +20% attack speed and -20% burst interval.

stat-fs-extra-utilities-lightnin-alloy.ammo = Fires a high-velocity bullet that leaves ion spheres along its path.\n On vanishing, the bullet explodes, dealing area damage and stunning nearby units.\n Splits into 3 drones that pursue enemies within 15 tiles.\n Drones hitting stunned units launch two homing particles for extra armor-piercing damage.\n Drones can only be destroyed by disintegration; on expiry they self-destruct for area damage.


